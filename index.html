<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pokeguess</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="images/pokeguess-icon.png">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700&display=swap');

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #2a363b;
            background-image: radial-gradient(circle at 50% 0%, #4b5d66, #2a363b 70%);
            color: #ffffff;
        }

        .title-font {
            font-family: 'Press Start 2P', cursive;
        }

        /* Sprite image styles */
        .pokemon-sprite {
            transition: all 0.5s ease;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
            image-rendering: pixelated;
        }

        .silhouette {
            filter: brightness(0) invert(0) drop-shadow(0 0 5px rgba(255,255,255,0.5));
        }

        .revealed {
            filter: none;
            transform: scale(1.1) translateY(-10px);
            drop-shadow: 0 0 20px rgba(255, 223, 0, 0.8);
        }

        /* Custom Scrollbar for hints */
        .hints-container::-webkit-scrollbar {
            width: 8px;
        }
        .hints-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
        }
        .hints-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 4px;
        }

        /* Pokeball Loading Animation */
        .pokeball-loader {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(to bottom, #ff0000 48%, #333 48%, #333 52%, #fff 52%);
            border: 3px solid #333;
            animation: spin 1s linear infinite;
            position: relative;
        }
        .pokeball-loader::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid #333;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-8 px-4 pb-20">

    <!-- Header -->
    <header class="text-center mb-6 w-full max-w-2xl">
        <h1 class="title-font text-2xl md:text-3xl text-yellow-400 drop-shadow-md mb-4 leading-relaxed">
            Pokeguess
        </h1>
        <h4 class="title-font text-2xl text-yellow-400 drop-shadow-md mb-4 leading-relaxed">
            devine le pokemon
        </h4>
        <div class="flex justify-between items-center bg-gray-800/80 p-4 rounded-xl border border-gray-600 shadow-lg">
            <div class="text-lg font-bold">
                <i class="fa-solid fa-star text-yellow-400 mr-2"></i>Score : <span id="score" class="text-2xl text-green-400 transition-colors">1000</span>
            </div>
            <div class="text-sm text-gray-300 bg-gray-900 py-1 px-3 rounded-full">
                <span id="streakCounter">0</span> victoire(s)
            </div>
        </div>
    </header>

    <!-- Main Game Container -->
    <main class="w-full max-w-2xl bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl shadow-2xl p-6 relative overflow-hidden">
        
        <!-- Loading State -->
        <div id="loadingScreen" class="absolute inset-0 bg-gray-900/90 z-20 flex flex-col items-center justify-center rounded-2xl">
            <div class="pokeball-loader mb-4"></div>
            <p class="text-xl font-bold animate-pulse text-yellow-400">Recherche d'un Pokémon sauvage...</p>
        </div>

        <!-- Visual / Image Area -->
        <div class="flex flex-col items-center justify-center mb-6 h-48 md:h-64 relative bg-black/20 rounded-xl border-2 border-dashed border-white/10">
            <img id="pokemonImage" src="" alt="???" class="pokemon-sprite silhouette h-full object-contain hidden" />
            <div id="questionMark" class="text-7xl font-bold text-gray-500 opacity-50 title-font absolute">?</div>
            
            <!-- Confetti / Success FX container -->
            <div id="successFx" class="absolute inset-0 pointer-events-none hidden bg-yellow-400/20 mix-blend-overlay rounded-xl"></div>
        </div>

        <!-- Game Controls & Info -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- Hints Section -->
            <div class="flex flex-col h-full">
                <h2 class="text-lg font-bold text-yellow-400 mb-2 border-b border-white/20 pb-1">
                    <i class="fa-solid fa-magnifying-glass mr-2"></i>Indices
                </h2>
                <div id="hintsContainer" class="hints-container flex-grow space-y-2 mb-4 h-40 overflow-y-auto pr-2">
                    <!-- Hints injected here -->
                </div>
                <button id="btnHint" class="w-full bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 text-white font-bold py-3 px-4 rounded-lg shadow-lg transform transition active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fa-solid fa-lightbulb mr-2"></i>Indice supp. (-150 pts)
                </button>
            </div>

            <!-- Guessing Section -->
            <div class="flex flex-col h-full justify-between">
                <div>
                    <h2 class="text-lg font-bold text-blue-400 mb-2 border-b border-white/20 pb-1">
                        <i class="fa-solid fa-keyboard mr-2"></i>Ta réponse
                    </h2>
                    <form id="guessForm" class="mt-4">
                        <input type="text" id="guessInput" autocomplete="off" placeholder="Ex: Pikachu..." class="w-full bg-gray-900 border-2 border-gray-600 focus:border-blue-500 rounded-lg py-3 px-4 text-xl text-center text-white placeholder-gray-500 outline-none transition disabled:opacity-50" required>
                        
                        <!-- Messages (Feedback) -->
                        <div id="messageArea" class="h-8 mt-2 text-center text-sm font-bold flex items-center justify-center transition-all opacity-0">
                            <!-- Messages go here -->
                        </div>

                        <div class="flex gap-2 mt-2">
                            <button type="button" id="btnSkip" class="w-1/3 bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 px-2 rounded-lg shadow-lg transform transition active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                                Passer
                            </button>
                            <button type="submit" id="btnSubmit" class="w-2/3 bg-gradient-to-r from-blue-500 to-blue-700 hover:from-blue-600 hover:to-blue-800 text-white font-bold py-3 px-4 rounded-lg shadow-lg transform transition active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                                Proposer
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Next Game Button (Hidden initially) -->
                <button id="btnNext" class="hidden w-full mt-4 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg transform transition active:scale-95 animate-bounce">
                    <i class="fa-solid fa-rotate-right mr-2"></i>Jouer encore
                </button>
            </div>
        </div>
    </main>

    <!-- Generation Selector (Floating Bottom-Left) -->
    <div class="fixed bottom-4 left-4 z-30 flex items-center bg-gray-800/95 backdrop-blur-md p-2.5 rounded-xl border border-gray-600 shadow-2xl transition hover:border-gray-500 max-w-[calc(100vw-2rem)]">
        <label for="genSelect" class="text-xs md:text-sm text-gray-300 font-bold mr-2 whitespace-nowrap">
            <i class="fa-solid fa-filter text-blue-400 mr-1"></i>Gén :
        </label>
        <select id="genSelect" class="bg-gray-900 border border-gray-600 text-white text-xs md:text-sm font-semibold rounded-lg px-2 py-1 outline-none focus:border-blue-500 transition cursor-pointer">
            <option value="all">Toutes</option>
            <option value="1">Gen 1 (1-151)</option>
            <option value="2">Gen 2 (152-251)</option>
            <option value="3">Gen 3 (252-386)</option>
            <option value="4">Gen 4 (387-493)</option>
            <option value="5">Gen 5 (494-649)</option>
            <option value="6">Gen 6 (650-721)</option>
            <option value="7">Gen 7 (722-809)</option>
            <option value="8">Gen 8 (810-898)</option>
            <option value="9">Gen 9 (899-1010)</option>
        </select>
    </div>

    <footer class="mt-8 text-gray-400 text-sm">
        Utilise <a href="https://pokeapi.co/" target="_blank" class="text-blue-400 hover:underline">PokéAPI</a> et à été créer en partie avec <i>Gemini</i>
    </footer>

    <script>
        // --- CONSTANTS & CONFIG ---
        const POINTS_START = 1000;
        const COST_HINT = 150;
        const PENALTY_MISTAKE = 50;

        // Generation ID ranges
        const GEN_RANGES = {
            'all': { min: 1, max: 1010 },
            '1': { min: 1, max: 151 },
            '2': { min: 152, max: 251 },
            '3': { min: 252, max: 386 },
            '4': { min: 387, max: 493 },
            '5': { min: 494, max: 649 },
            '6': { min: 650, max: 721 },
            '7': { min: 722, max: 809 },
            '8': { min: 810, max: 898 },
            '9': { min: 899, max: 1010 }
        };

        // Dictionaries to translate English data to French manually when API doesn't provide it
        const TYPES_FR = {
            normal: 'Normal', fighting: 'Combat', flying: 'Vol', poison: 'Poison', 
            ground: 'Sol', rock: 'Roche', bug: 'Insecte', ghost: 'Spectre', 
            steel: 'Acier', fire: 'Feu', water: 'Eau', grass: 'Plante', 
            electric: 'Électrik', psychic: 'Psy', ice: 'Glace', dragon: 'Dragon', 
            dark: 'Ténèbres', fairy: 'Fée'
        };

        const COLORS_FR = {
            black: 'Noir', blue: 'Bleu', brown: 'Marron', gray: 'Gris', 
            green: 'Vert', pink: 'Rose', purple: 'Violet', red: 'Rouge', 
            white: 'Blanc', yellow: 'Jaune'
        };

        // --- STATE VARIABLES ---
        let state = {
            pokemonNameFr: "",
            score: POINTS_START,
            hintsAvailable: [],
            hintsRevealed: 0,
            gameOver: false,
            streak: 0
        };

        // --- DOM ELEMENTS ---
        const els = {
            loadingScreen: document.getElementById('loadingScreen'),
            pokemonImage: document.getElementById('pokemonImage'),
            questionMark: document.getElementById('questionMark'),
            hintsContainer: document.getElementById('hintsContainer'),
            btnHint: document.getElementById('btnHint'),
            guessForm: document.getElementById('guessForm'),
            guessInput: document.getElementById('guessInput'),
            btnSubmit: document.getElementById('btnSubmit'),
            btnSkip: document.getElementById('btnSkip'),
            score: document.getElementById('score'),
            streakCounter: document.getElementById('streakCounter'),
            messageArea: document.getElementById('messageArea'),
            btnNext: document.getElementById('btnNext'),
            successFx: document.getElementById('successFx'),
            genSelect: document.getElementById('genSelect')
        };

        // --- UTILS ---
        
        // Remove accents and special characters for easy comparison
        const normalizeString = (str) => {
            return str.normalize("NFD")
                      .replace(/[\u0300-\u036f]/g, "")
                      .replace(/[^a-zA-Z0-9]/g, "")
                      .toLowerCase();
        };

        const updateScoreUI = () => {
            els.score.innerText = state.score;
            if(state.score < 500) els.score.className = "text-2xl text-orange-400 transition-colors";
            if(state.score < 200) els.score.className = "text-2xl text-red-500 transition-colors font-bold";
            if(state.score >= 500) els.score.className = "text-2xl text-green-400 transition-colors";
        };

        const showMessage = (msg, type = "error") => {
            els.messageArea.innerHTML = msg;
            els.messageArea.style.opacity = 1;
            els.messageArea.className = `h-8 mt-2 text-center text-sm font-bold flex items-center justify-center transition-all rounded ${
                type === "error" ? "bg-red-500/20 text-red-400" : "bg-green-500/20 text-green-400"
            }`;
            
            if(type === "error") {
                // Shake effect
                els.guessInput.classList.add('translate-x-[-5px]');
                setTimeout(() => els.guessInput.classList.replace('translate-x-[-5px]', 'translate-x-[5px]'), 50);
                setTimeout(() => els.guessInput.classList.remove('translate-x-[5px]'), 100);
            }

            setTimeout(() => {
                if(!state.gameOver) els.messageArea.style.opacity = 0;
            }, 3000);
        };

        // --- GAME LOGIC ---

        const initGame = async () => {
            // Reset UI
            state.score = POINTS_START;
            state.gameOver = false;
            state.hintsRevealed = 0;
            
            updateScoreUI();
            els.hintsContainer.innerHTML = '';
            els.guessInput.value = '';
            els.guessInput.disabled = false;
            els.btnSubmit.disabled = false;
            els.btnSkip.disabled = false;
            els.btnHint.disabled = false;
            els.btnNext.classList.add('hidden');
            els.pokemonImage.classList.remove('revealed');
            els.pokemonImage.classList.add('silhouette', 'hidden');
            els.questionMark.classList.remove('hidden');
            els.messageArea.style.opacity = 0;
            els.successFx.classList.add('hidden');
            
            els.loadingScreen.classList.remove('hidden');

            try {
                // Fetch random pokemon based on selected generation
                const selectedGen = els.genSelect.value;
                const { min, max } = GEN_RANGES[selectedGen];
                const id = Math.floor(Math.random() * (max - min + 1)) + min;

                const [pokeRes, speciesRes] = await Promise.all([
                    fetch(`https://pokeapi.co/api/v2/pokemon/${id}`),
                    fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`)
                ]);

                if (!pokeRes.ok || !speciesRes.ok) throw new Error("Erreur réseau");

                const pokeData = await pokeRes.json();
                const speciesData = await speciesRes.json();

                prepareGameData(pokeData, speciesData);
                
                // Set Image
                els.pokemonImage.src = pokeData.sprites.other['official-artwork'].front_default || pokeData.sprites.front_default;

                // Show first hint automatically
                revealHint(true);
                
                els.loadingScreen.classList.add('hidden');
                els.guessInput.focus();

            } catch (error) {
                console.error(error);
                els.loadingScreen.innerHTML = `<p class="text-red-500 font-bold">Erreur de chargement. Veuillez recharger la page.</p>`;
            }
        };

        const prepareGameData = (pokeData, speciesData) => {
            // Find French Name
            const frNameObj = speciesData.names.find(n => n.language.name === 'fr');
            state.pokemonNameFr = frNameObj ? frNameObj.name : pokeData.name;

            // Generate Types (Fr)
            const types = pokeData.types.map(t => TYPES_FR[t.type.name] || t.type.name).join(' / ');

            // Generate Color (Fr)
            const color = COLORS_FR[speciesData.color.name] || speciesData.color.name;

            // Find French Description & Censor the name
            const frFlavorObj = speciesData.flavor_text_entries.find(f => f.language.name === 'fr');
            let description = frFlavorObj ? frFlavorObj.flavor_text.replace(/[\n\f]/g, ' ') : "Aucune description trouvée.";
            
            // Regex to replace the pokemon name in the description (case insensitive)
            const nameRegex = new RegExp(state.pokemonNameFr, "gi");
            description = description.replace(nameRegex, "<strong>[???]</strong>");

            // Generation parsing
            const genNum = speciesData.generation.name.split('-')[1].toUpperCase();

            // Prepare hints sequence
            state.hintsAvailable = [
                `La 1ère lettre de son nom est : <span class="font-bold text-white uppercase">${state.pokemonNameFr.charAt(0)}</span> (Il a ${state.pokemonNameFr.length} lettres).`,
                `Son (ou ses) type(s) : <span class="font-bold text-white">${types}</span>.`,
                `Il est apparu lors de la génération <span class="font-bold text-white">${genNum}</span>.`,
                `Physique : Couleur dominante <span class="font-bold text-white">${color}</span>, pèse <span class="font-bold text-white">${pokeData.weight / 10}kg</span> and mesure <span class="font-bold text-white">${pokeData.height / 10}m</span>.`,
                `Pokédex : <em>"${description}"</em>`,
                `SILHOUETTE` // Special keyword
            ];
        };

        const revealHint = (isFree = false) => {
            if (state.hintsRevealed >= state.hintsAvailable.length) return;

            if (!isFree) {
                state.score = Math.max(0, state.score - COST_HINT);
                updateScoreUI();
            }

            const hint = state.hintsAvailable[state.hintsRevealed];
            
            if (hint === "SILHOUETTE") {
                // Action to show silhouette
                els.questionMark.classList.add('hidden');
                els.pokemonImage.classList.remove('hidden');
                addHintToDOM("Silhouette dévoilée ! Regarde l'image.");
                els.btnHint.disabled = true;
                els.btnHint.innerHTML = "Plus d'indices disponibles";
            } else {
                addHintToDOM(`Indice ${state.hintsRevealed + 1} : ${hint}`);
            }

            state.hintsRevealed++;
            
            // Auto scroll to bottom
            els.hintsContainer.scrollTop = els.hintsContainer.scrollHeight;
        };

        const addHintToDOM = (htmlContent) => {
            const hintDiv = document.createElement('div');
            hintDiv.className = "bg-gray-800/80 p-3 rounded border border-gray-700 text-gray-300 text-sm animate-[fadeIn_0.3s_ease-out]";
            hintDiv.innerHTML = htmlContent;
            els.hintsContainer.appendChild(hintDiv);
        };

        const handleGuess = (e) => {
            e.preventDefault();
            if (state.gameOver) return;

            const userGuess = els.guessInput.value.trim();
            if (!userGuess) return;

            const targetNormalized = normalizeString(state.pokemonNameFr);
            const guessNormalized = normalizeString(userGuess);

            if (guessNormalized === targetNormalized) {
                // WIN
                triggerWin();
            } else {
                // LOSE POINTS
                state.score = Math.max(0, state.score - PENALTY_MISTAKE);
                updateScoreUI();
                showMessage(`Non, ce n'est pas ${userGuess} ! (-${PENALTY_MISTAKE} pts)`, "error");
                els.guessInput.value = '';
                els.guessInput.focus();
                
                if (state.score === 0) {
                    triggerLoss();
                }
            }
        };

        const triggerWin = () => {
            state.gameOver = true;
            state.streak++;
            els.streakCounter.innerText = state.streak;
            
            // Reveal Pokemon visually
            els.questionMark.classList.add('hidden');
            els.pokemonImage.classList.remove('hidden', 'silhouette');
            els.pokemonImage.classList.add('revealed');
            els.successFx.classList.remove('hidden');
            
            // Disable Inputs
            els.guessInput.disabled = true;
            els.btnSubmit.disabled = true;
            els.btnSkip.disabled = true;
            els.btnHint.disabled = true;
            
            // UI Updates
            showMessage(`<i class="fa-solid fa-trophy mr-2"></i>Bravo ! C'était bien <strong>${state.pokemonNameFr}</strong> !`, "success");
            els.messageArea.style.opacity = 1;
            
            els.btnNext.classList.remove('hidden');
        };

        const triggerLoss = (isSkip = false) => {
            state.gameOver = true;
            state.streak = 0;
            els.streakCounter.innerText = state.streak;
            
            // Reveal Pokemon visually (Desaturated to show loss)
            els.questionMark.classList.add('hidden');
            els.pokemonImage.classList.remove('hidden', 'silhouette');
            els.pokemonImage.style.filter = "grayscale(80%)";
            
            // Disable Inputs
            els.guessInput.disabled = true;
            els.btnSubmit.disabled = true;
            els.btnSkip.disabled = true;
            els.btnHint.disabled = true;
            
            // UI Updates
            const msg = isSkip ? `Tu as passé... Le Pokémon était <strong>${state.pokemonNameFr}</strong>.` : `Perdu... Le Pokémon était <strong>${state.pokemonNameFr}</strong>.`;
            showMessage(msg, "error");
            els.messageArea.style.opacity = 1;
            
            els.btnNext.classList.remove('hidden');
        };

        // --- EVENT LISTENERS ---
        els.btnHint.addEventListener('click', () => revealHint(false));
        els.guessForm.addEventListener('submit', handleGuess);
        els.btnSkip.addEventListener('click', () => {
            if (!state.gameOver) triggerLoss(true);
        });
        els.btnNext.addEventListener('click', () => {
            els.pokemonImage.style.filter = ""; // Reset inline style
            initGame();
        });
        
        // Listen for generation change
        els.genSelect.addEventListener('change', () => {
            els.pokemonImage.style.filter = ""; 
            initGame(); // Restarts the game with a pokemon from the new generation
        });

        // Add custom animation for hints
        tailwind.config = {
            theme: {
                extend: {
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(5px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }

        // Start the game on load
        window.onload = initGame;
    </script>
</body>
</html>
